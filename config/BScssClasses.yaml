# Regex patterns for PurgeCSS safelisting
# These are used for classes constructed dynamically in JS or those with many variants
safelist:
  standard:
    - "html"
    - "body"
    - "^carousel-"
    - "^ratio-"
    - "^bg-"
    - "^text-"
    - "^link-"
    - "^btn-"
    - "^g-"
    - "^p[tbesxy]?-"
    - "^m[tbesxy]?-"
    - "^rounded-"
    - "^border-"
    - "^col-"
    - "^row-"
    - "^d-"
    - "^flex-"
    - "^justify-"
    - "^align-"
    - "^position-"
    - "^top-"
    - "^bottom-"
    - "^start-"
    - "^end-"
    - "^translate-"
    - "^float-"
    - "^w-"
    - "^h-"
    - "^opacity-"
    - "^shadow-"
    - "^display-"
    - "^fw-"
    - "^blur-"
    - "^st"
    - "^bi-"
  deep:
    - "carousel"
    - "ratio"
  greedy:
    - "carousel"
    - "ratio"
