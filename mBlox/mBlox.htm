            /**
             * Dynamically creates and appends mBlox sections to the document body.
             * @param {Array<Object>} configs - An array of block configuration objects.
             */
            function generateBlocks(configs) {
                const fragment = document.createDocumentFragment();

                configs.forEach(config => {
                    const section = document.createElement('section');
                    
                    // Iterate over the config object and set attributes
                    for (const key in config) {
                        if (Object.hasOwnProperty.call(config, key)) {
                            const value = config[key];
                            if (key === 'class') {
                                section.className = value;
                            } else {
                                const dataKey = key; // Use the key directly as mBloxScript expects case-sensitive attributes
                                section.setAttribute(`data-${dataKey}`, value);
                            }
                        }
                    }
                    fragment.appendChild(section);
                });

                document.body.appendChild(fragment);
            }

            // Generate the blocks when the DOM is ready
            document.addEventListener('DOMContentLoaded', () => {
                generateBlocks(blockConfigurations);
            });
